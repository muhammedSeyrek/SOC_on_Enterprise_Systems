# ============================================================
#  DMZ — OpenVPN Gateway (KİŞİ 3)
#  Sertifika tabanlı kimlik + crl-verify (revoked reddi).
#  Bağlantı anında CN -> RADIUS'a authorization sorulur (devret).
# ============================================================
port 1194
proto udp
dev tun

ca   /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/server.crt
key  /etc/openvpn/pki/server.key
dh   /etc/openvpn/pki/dh.pem

# Revoked sertifikaları TLS katmanında reddet (Red Team senaryosu 1)
crl-verify /etc/openvpn/pki/crl.pem
# İstemci mutlaka clientAuth EKU'lu sertifika sunmalı
remote-cert-tls client

topology subnet
server 10.8.0.0 255.255.255.0

# Lab iç ağ route'u (örnek)
push "route 172.16.0.0 255.255.0.0"

# Kimlik doğrulamayı RADIUS'a devret: bağlantı anında CN -> radclient
client-connect /etc/openvpn/client-connect.sh
script-security 2

keepalive 10 120
persist-key
persist-tun
cipher AES-256-GCM
auth SHA256
verb 4
status /var/log/openvpn/openvpn-status.log 10
log-append /var/log/openvpn/openvpn.log
