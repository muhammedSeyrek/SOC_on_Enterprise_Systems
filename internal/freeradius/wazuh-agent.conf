<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>

    <config-profile>freeradius</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>30</time-reconnect>
    <auto_restart>no</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <active-response>
    <disabled>no</disabled>
  </active-response>
</ossec_config>
